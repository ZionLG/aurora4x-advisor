name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: pnpm build:linux
          - os: windows-latest
            build_cmd: pnpm build:win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: ${{ matrix.build_cmd }}
